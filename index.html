<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INICIO-La Herradura</title>
    <link rel="stylesheet" href="css/index.css">
    <script defer src="js/index.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- header -->
    <header>
        <div class="Wrapper-header">
            <div class="Container-header">
                <div class="Header-menu-hamburguesa">
                    <img src="../assets/Icons/menu.svg" alt="Menu-hamburguesa" class="Menu-hamburguesa">
                </div>
                <ul class="Header-menu-sticky">
                    <li class="Header-menu-quienes-somos">QUIENES SOMOS</li>
                    <li class="Header-menu-servicios">SERVICIOS</li>
                    <li class="Header-menu-Contacta">CONTACTA</li>
                </ul>
            </div>
        </div>
    </header>
    <!-- /header -->
    <!-- main -->
    <main>

        <!-- sección parallax -->
        <div class="Section-parallax">
            <img src="../assets/imgs/Instagram/logo-la-herradura-blanco.svg" alt="logotipo-La-Herradura" class="Parallax-logo">
        </div>

        <!-- sección servicios -->
        <div class="Section-services">
            <div class="Wrapper-services">
                <div class="Wrapper-h2">
                    <h2 class="Services-h2">SERVICIOS QUE OFRECEMOS</h2>
                </div>
                <div class="Trigger"></div>
                <ul class="Services-ul">
                    <li class="Services-li">
                        <h3 class="Services-h3">MAÑANAS A CABALLO</h3>
                            <img src="../assets/imgs/Instagram/INICIO-MAÑANAS-A-CABALLO.jpg" alt="Mañanas-a-caballo" class="Services-imgs" loading="lazy">
                    </li>
                    <li class="Services-li">
                        <h3 class="Services-h3">CLASES DE EQUITACION</h3>
                            <img src="../assets/imgs/Instagram/INICIO-CLASES.jpg" alt="Clases" class="Services-imgs" loading="lazy">
                    </li>
                    <li class="Services-li">
                        <h3 class="Services-h3">TERAPIAS</h3>
                        <img src="../assets/imgs/Instagram/INICIO-SERVICIOS-TERAPEUTICOS.jpg" alt="Terapias" class="Services-imgs" loading="lazy">
                    </li>
                </ul>
            </div>
        </div>
        <!-- /sección servicios -->

        <!-- sección formulario -->
        <div class="Section-subscribe">
            <div class="Wrapper-subs">
                <div class="Sub-left">
                    <h4 class="Sub-left-h4">SUSCRIBETE</h4>
                    <div class="Sub-left-form">
                        <form action="URL" method="get" enctype="multipart/form-data">
                            <div class="Form-left">
                                <label for="primero"></label>
                                <input type="text" placeholder="Nombre" name="Nombre" id="primero" required
                                    autocomplete="off">
                                <div>
                                    <label for="segundo"></label>
                                    <input type="email" placeholder="email" name="email" required id="segundo">
                                </div>
                            </div>
                            <div class="Form-right">
                                <input type="submit" value="Suscribirse">
                                <div>
                                    <label for="legal">Acepto los términos</label>
                                    <input type="checkbox" name="acepto" required id="legal">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="Sub-right">
                    <div class="Sub-right-container-img-background">
                        <img src="../assets/imgs/Instagram/background-rrss.JPG" alt="Background-sr" loading="lazy">
                    </div>
                    <div class="Sub-right-container-rrss">
                        <div class="Container-rrss">
                            <ul class="Rrss-ul">
                                <li class="Rrss-li">
                                    <a href="Facebook" class="Rrss-li-a">
                                        <img src="../assets/Icons/facebook.svg" alt="Fb" class="Rrss-li-img" loading="lazy">
                                    </a>
                                </li>
                                <li class="Rrss-li">
                                    <a href="Twitter" class="Rrss-li-a">
                                        <img src="../assets/Icons/twitter-x.svg" alt="X" class="Rrss-li-img" loading="lazy">
                                    </a>
                                </li>
                                <li class="Rrss-li">
                                    <a href="Instagram" class="Rrss-li-a">
                                        <img src="../assets/Icons/instagram.svg" alt="Instagram" class="Rrss-li-img" loading="lazy">
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- /sección formulario -->
    </main>
    <!-- /main -->
    <!-- footer -->
    <footer>
        <div class="Wrapper-footer">
            <div class="Footer-policy">
                <ul class="Policy-ul">
                    <li class="Policy-li">
                        <a href="#" class="Policy-a">Política de Cookies</a>
                    </li>
                    <li class="Policy-li">
                        <a href="#" class="Policy-a">Política de Privacidad</a>
                    </li>
                    <li class="Policy-li">
                        <a href="#" class="Policy-a">Aviso Legal</a>
                    </li>
                </ul>
            </div>
            <div class="Footer-copy">
                <div class="Copy">&copy;La Herradura 2020</div>
            </div>
        </div>
    </footer>
    <!-- /footer -->
</body>

</html>
